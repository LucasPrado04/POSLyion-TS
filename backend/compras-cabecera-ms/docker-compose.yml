version: '3'
services:
  compras-cabecera-db:
    container_name: compras-cabecera_database
    image: postgres:16.2
    restart: always
    volumes:
      - ./postgres:/var/lib/postgresql/data
    ports:
      - 5432:5432
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=12346
      - POSTGRES_DB=compras-cabecera_db